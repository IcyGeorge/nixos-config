[backdrop]
enabled = true

[bar.default]
end = [
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
start = [ "launcher", "workspaces", "media" ]

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1", "lockscreen-widget-0000000000000001" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 768.0
    cy = 837.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 0.0
    box_width = 0.0
    cx = 768.0
    cy = 480.0
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

[plugins]
enabled = [ "noctalia/bongocat" ]

[shell]
font_family = "Maple Mono NF"
settings_show_advanced = true

[theme]
builtin = "Gruvbox"
community_palette = "Oxocarbon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[wallpaper]
directory = "/home/gmelika/nixos-config/assets/wallpapers"

    [wallpaper.default]
    path = "/home/gmelika/nixos-config/assets/wallpapers/wallpaper.jpg"

    [wallpaper.last]
    path = "/home/gmelika/nixos-config/assets/wallpapers/wallpaper.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/gmelika/nixos-config/assets/wallpapers/wallpaper.jpg"

[widget.battery]
show_label = false

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%-I:%M %p %d %b %Y}"

[widget.network]
show_label = false

[widget.tray]
drawer = true

[widget.volume]
show_label = false
