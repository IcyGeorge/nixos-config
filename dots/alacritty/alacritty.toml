# $HOME/.config/alacritty/alacritty.toml

[window]
opacity = 0.9

padding.x = 10
padding.y = 10

[font]
normal.family = "Maple Mono NF"
bold.family = "Maple Mono NF"
italic.family = "Maple Mono NF"
bold_italic.family = "Maple Mono NF"

size = 14.0


# Colors (Noctalia)

[colors.bright]
black = '#928374'
blue = '#83a598'
cyan = '#8ec07c'
green = '#b8bb26'
magenta = '#d3869b'
red = '#fb4934'
white = '#ebdbb2'
yellow = '#fabd2f'

[colors.cursor]
cursor = '#ebdbb2'
text = '#282828'

[colors.normal]
black = '#282828'
blue = '#458588'
cyan = '#689d6a'
green = '#98971a'
magenta = '#b16286'
red = '#cc241d'
white = '#a89984'
yellow = '#d79921'

[colors.primary]
background = '#282828'
foreground = '#ebdbb2'

[colors.selection]
background = '#665c54'
text = '#ebdbb2'
