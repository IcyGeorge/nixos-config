# ~/.config/kitty/kitty.conf

include current-theme.conf

# Window
background_opacity 0.9

window_padding_width 10 5 10 5

# Font
font_family      Maple Mono NF
bold_font        Maple Mono NF
italic_font      Maple Mono NF
bold_italic_font Maple Mono NF

font_size 14.0

# Clipboard
copy_on_select yes

# tabs
tab_bar_style powerline
tab_powerline_style slanted

active_tab_font_style bold
inactive_tab_font_style normal


# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9


# Splits (Windows)
map ctrl+n launch --location=vsplit
map ctrl+shift+n launch --location=hsplit
map ctrl+x close_window

map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right


# Resizing
map ctrl+alt+h resize_window wider 5
map ctrl+alt+l resize_window narrower 5
map ctrl+alt+k resize_window taller 5
map ctrl+alt+j resize_window shorter 5


# Layouts
map ctrl+space next_layout
map ctrl+shift+space last_used_layout
enabled_layouts splits,stack
tab_title_template "{cwd}"
